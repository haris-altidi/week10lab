name: FLASK CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ./fullstack/api/requirements.txt
          pip install pytest

      - name: Run pytest
        run: python -m pytest ./fullstack/api/test_app.py -v

      - name: Verify health endpoint exists
        run: python -c "from ../../fullstack/api/app import app; assert '/api/health' in [r.rule for r in app.url_map.iter_rules()]"

  build-docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t flask-api:${{ github.sha }} .

      - name: Verify container starts correctly
        run: |
          docker run -d -p 5001:5000 --name test-container \
            flask-api:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5001/api/health
          docker stop test-container
          docker rm test-container